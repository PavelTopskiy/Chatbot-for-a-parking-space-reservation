name: CI

on:
  push:
    branches: [main, "stage-*/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11"]

    env:
      # Satisfy config load-time checks without making any external calls.
      # Tests stub out OpenAI, Pinecone, and the MCP server.
      OPENAI_API_KEY: test-dummy
      PINECONE_API_KEY: test-dummy
      PINECONE_INDEX_NAME: test-index
      MCP_SECRET: test-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check (compile all sources)
        run: python -m compileall -q src tests scripts eval

      - name: Run pytest
        run: pytest -q --tb=short

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: skypark:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image imports
        run: |
          docker run --rm \
            -e OPENAI_API_KEY=test-dummy \
            -e PINECONE_API_KEY=test-dummy \
            -e PINECONE_INDEX_NAME=test-index \
            -e MCP_SECRET=test-secret \
            skypark:ci \
            python -c "from src import server, mcp_server, orchestrator; print('ok')"
