name: Load test (manual)

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - db
          - mcp
          - orch
      total:
        description: "Total number of operations"
        required: false
        default: "40"
      workers:
        description: "Concurrent workers"
        required: false
        default: "10"

jobs:
  load:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: test-dummy
      PINECONE_API_KEY: test-dummy
      PINECONE_INDEX_NAME: test-index
      MCP_SECRET: test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run load test — ${{ inputs.scenario }}
        run: |
          python -m scripts.load_test ${{ inputs.scenario }} \
            --total ${{ inputs.total }} \
            --workers ${{ inputs.workers }} \
            | tee load-test-report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-${{ inputs.scenario }}-${{ github.run_id }}
          path: load-test-report.txt
